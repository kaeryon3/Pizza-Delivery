<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            name="description"
            content="Fresh pizza delivered to your door in 30 minutes. Order online from Margherita, Pepperoni, Hawaiian, BBQ Chicken, and more. Fast, tasty, and convenient!"
        />
        <meta
            name="keywords"
            content="pizza delivery, online pizza order, Margherita, Pepperoni, Hawaiian pizza, BBQ Chicken, vegetarian pizza, fresh pizza, fast delivery"
        />

        <title>Pizza Delivery</title>
        <link rel="icon" href="images/favicon.png" type="image/png" />
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
        <link
            rel="stylesheet"
            href="https://kaeryon3.github.io/Pizza-Delivery/css/styles.css"
        />
    </head>
    <body>
        <!-- Navbar -->

        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container-fluid">
                <a class="navbar-brand" href="/Pizza-Delivery/index.html">
                    <img
                        src="https://kaeryon3.github.io/Pizza-Delivery/images/logo.png"
                        alt="logo"
                    />
                </a>
                <button
                    class="navbar-toggler"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#navbarNav"
                    aria-controls="navbarNav"
                    aria-expanded="false"
                    aria-label="Toggle navigation"
                >
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a
                                class="nav-link active"
                                href="/Pizza-Delivery/index.html"
                                >Home</a
                            >
                        </li>
                        <li class="nav-item">
                            <a
                                class="nav-link"
                                href="/Pizza-Delivery/pages/menu.html"
                                >Pizza</a
                            >
                        </li>
                        <li class="nav-item">
                            <a
                                class="nav-link"
                                href="/Pizza-Delivery/pages/menu.html#drinks"
                                >Drinks</a
                            >
                        </li>
                        <li class="nav-item d-lg-none">
                            <a
                                href="/Pizza-Delivery/pages/cart.html"
                                class="cart-icon my-2"
                            >
                                <img src="images/cart.png" alt="Cart" />
                                <span class="cart-count">0</span>
                            </a>
                        </li>
                    </ul>

                    <a
                        href="/Pizza-Delivery/pages/cart.html"
                        class="cart-icon ms-3 d-none d-lg-inline-block"
                    >
                        <img src="images/cart.png" alt="Cart" />
                        <span class="cart-count">0</span>
                    </a>
                </div>
            </div>
        </nav>

        <!-- Hero -->

        <section class="hero">
            <div class="hero-overlay"></div>
            <div class="container hero-content">
                <h1 class="display-3 fw-bold">Fresh pizza in 30 minutes</h1>
                <p class="lead">Order online and enjoy fresh pizza at home!</p>
                <a
                    href="/Pizza-Delivery/pages/menu.html"
                    class="btn btn-warning btn-lg hero-btn"
                    >Order Now</a
                >
            </div>
        </section>

        <!-- Footer -->

        <footer class="site-footer bg-dark text-light py-4">
            <div class="container">
                <div class="row align-items-center">
                    <div class="col-6 text-start">
                        <p class="mb-1">
                            &copy; 2026 Fresh Pizza. All rights reserved.
                        </p>
                        <p class="mb-0">
                            <a
                                href="pages/policy.html"
                                class="text-light text-decoration-underline"
                                >Privacy Policy</a
                            >
                        </p>
                    </div>

                    <div class="col-6 text-end">
                        <p class="mb-1">📞 +1 (555) 428-2037</p>
                        <p class="mb-1">📍 13 Green Street, New York City</p>
                        <p class="mb-0">✉️ contact@freshpizza.com</p>
                    </div>
                </div>
            </div>
        </footer>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://kaeryon3.github.io/Pizza-Delivery/js/script.js"></script>
    </body>
</html>
